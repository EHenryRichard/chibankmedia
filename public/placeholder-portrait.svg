<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 820" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1919"/>
      <stop offset="100%" stop-color="#2c2929"/>
    </linearGradient>
    <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d3737"/>
      <stop offset="100%" stop-color="#2e2929"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%" stop-color="#2c2929" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2c2929" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="side-vignette" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1c1919" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1c1919" stop-opacity="0.55"/>
    </radialGradient>
    <clipPath id="portrait-clip">
      <rect width="600" height="820"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="820" fill="url(#bg-grad)"/>

  <!-- Subtle vertical lines texture -->
  <g opacity="0.04" stroke="#f2ede7" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="820"/>
    <line x1="200" y1="0" x2="200" y2="820"/>
    <line x1="300" y1="0" x2="300" y2="820"/>
    <line x1="400" y1="0" x2="400" y2="820"/>
    <line x1="500" y1="0" x2="500" y2="820"/>
  </g>

  <!-- Person silhouette -->
  <g clip-path="url(#portrait-clip)">
    <!-- Head -->
    <circle cx="300" cy="240" r="120" fill="url(#body-grad)"/>
    <!-- Neck -->
    <rect x="262" y="345" width="76" height="70" fill="#3d3737" rx="10"/>
    <!-- Shoulders / torso -->
    <path d="M 0 680 Q 80 500 160 460 Q 220 435 300 430 Q 380 435 440 460 Q 520 500 600 680 L 600 820 L 0 820 Z" fill="url(#body-grad)"/>
    <!-- Collar hint -->
    <path d="M 262 415 Q 300 450 338 415" stroke="#2e2929" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- Side vignette -->
  <rect width="600" height="820" fill="url(#side-vignette)"/>
  <!-- Bottom fade into page -->
  <rect width="600" height="820" fill="url(#bottom-fade)"/>

  <!-- Thin border frame -->
  <rect x="1" y="1" width="598" height="818" fill="none" stroke="rgba(242,237,231,0.06)" stroke-width="1"/>

  <!-- Label -->
  <text x="300" y="796" text-anchor="middle" fill="rgba(242,237,231,0.22)" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="5" font-weight="300">PHOTO COMING SOON</text>
</svg>
